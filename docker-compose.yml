# Dockge stack for minice.ai.
#
# The image is built and published by GitHub Actions (see
# .github/workflows/docker-publish.yml) to GitHub Container Registry.
# Dockge's "update" button runs `docker compose pull && up -d`, so this
# file references a published image — it does NOT build locally.
#
# Setup on the server:
#   1. Create this stack in Dockge.
#   2. Put SIGNING_KEY into the stack's .env (Dockge env editor) — it is
#      a RUNTIME secret. MODEL_KEY is NOT needed at runtime (already
#      baked into the image at build time).
#   3. Deploy. Point your reverse proxy (nginx / Caddy / NPM) at
#      127.0.0.1:8088.
#
# The port is bound to 127.0.0.1 ONLY — the container is never exposed
# directly to the internet, only reachable through the reverse proxy.

services:
  web:
    # GHCR path = lowercased "<owner>/<repo>". The CI workflow publishes
    # to ghcr.io/${{ github.repository }}, lowercased by metadata-action.
    image: ghcr.io/knice-tech/minice-ai-site:latest
    container_name: minice
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      # SIGNING_KEY must be supplied via the stack .env / Dockge env editor.
      SIGNING_KEY: ${SIGNING_KEY:?SIGNING_KEY is required}
