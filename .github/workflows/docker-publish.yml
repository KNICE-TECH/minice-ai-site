name: Build & publish Docker image

# Builds the production image on every push to main and publishes it to
# GitHub Container Registry (GHCR). Dockge on the server then pulls the
# updated image via its "update" button.
#
# Required repo secret:
#   MODEL_KEY — the 32-byte hex AES key. MUST match the key that
#   encrypted the committed server/assets/nayu.bin. It is baked into the
#   WASM decryptor at build time. Set it in:
#   Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action lowercases the image name (GHCR requires it) and
      # produces both a :latest tag and a commit-SHA tag.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODEL_KEY=${{ secrets.MODEL_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
